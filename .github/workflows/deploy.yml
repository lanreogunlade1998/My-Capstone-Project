name: Build and Deploy Sprevonix

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/lanreogunlade1998/sprevonix:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ghcr.io/lanreogunlade1998/sprevonix:latest
            sudo docker stop sprevonix || true
            sudo docker rm sprevonix || true
            sudo docker run -d --name sprevonix \
              -p 80:80 \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_NAME="sprevonix" \
              -e DB_USER="admin" \
              -e DB_PASS="${{ secrets.DB_PASS }}" \
              ghcr.io/lanreogunlade1998/sprevonix:latest